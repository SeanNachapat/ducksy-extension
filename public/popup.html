<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ducksy</title>
    <link rel="stylesheet" href="../dist/styles.css" />
</head>

<body class="w-[380px] bg-transparent text-[#ededed] font-sans antialiased overflow-hidden">
    <div class="rounded-xl bg-[#0a0a0a] overflow-hidden">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-5 pb-3">
            <div class="flex items-center gap-2.5">
                <span class="text-2xl">🦆</span>
                <h1 class="text-lg font-bold text-[#ededed] tracking-tight">Ducksy</h1>
            </div>
            <button id="btn-settings" class="text-gray-500 hover:text-gray-300 transition-colors" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <!-- Action Buttons -->
        <div class="px-5 pb-4 flex gap-2.5">
            <button id="btn-summarize"
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-black text-sm font-bold transition-all duration-200 active:scale-[0.98]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                Summarize Tab
            </button>
            <button id="btn-record"
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-[#141414] hover:bg-[#1f1f1f] text-[#ededed] text-sm font-semibold transition-all duration-200 active:scale-[0.98] border border-white/5">
                <svg id="mic-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z" />
                </svg>
                <span id="record-label">Voice Record</span>
            </button>
        </div>

        <!-- Status / Loading -->
        <div id="status-bar" class="hidden px-5 pb-4">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-900 border border-gray-800">
                <div class="flex gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-bounce"
                        style="animation-delay: 0ms"></span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-bounce"
                        style="animation-delay: 150ms"></span>
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-bounce"
                        style="animation-delay: 300ms"></span>
                </div>
                <span id="status-text" class="text-sm text-gray-400">Processing…</span>
            </div>
        </div>

        <!-- Error -->
        <div id="error-bar" class="hidden px-5 pb-4">
            <div class="p-3 rounded-xl bg-red-950/50 border border-red-900/50 text-sm text-red-300">
                <span id="error-text"></span>
            </div>
        </div>

        <!-- Result Card -->
        <div id="result-card" class="hidden px-5 pb-4">
            <div class="p-4 rounded-xl bg-[#141414] border border-white/5 space-y-3">
                <div class="flex items-start justify-between gap-2">
                    <h2 id="result-title" class="text-sm font-bold text-[#ededed] leading-snug"></h2>
                    <span id="result-type"
                        class="shrink-0 px-2 py-0.5 rounded-md text-[11px] font-semibold uppercase tracking-wider"></span>
                </div>
                <p id="result-summary" class="text-xs text-[#a3a3a3] leading-relaxed"></p>

                <!-- Action Items -->
                <div id="action-items-section" class="hidden">
                    <h3 class="text-xs font-semibold text-[#737373] uppercase tracking-wider mb-2">Action Items</h3>
                    <ul id="action-items-list" class="space-y-1.5"></ul>
                </div>

                <!-- Open in Side Panel -->
                <button id="btn-open-panel"
                    class="w-full mt-2 py-2 rounded-lg bg-[#1a1a1a] hover:bg-[#262626] text-xs text-[#d4d4d4] font-medium transition-colors border border-white/5">
                    Open in Side Panel →
                </button>
            </div>
        </div>

        <!-- Recent Sessions -->
        <div class="px-5 pb-5">
            <h3 class="text-xs font-semibold text-[#737373] uppercase tracking-wider mb-2.5">Recent Sessions</h3>
            <div id="sessions-list" class="space-y-2">
                <p id="no-sessions" class="text-xs text-[#525252] py-3 text-center">No sessions yet</p>
            </div>
        </div>

        <script src="../dist/popup/popup.js"></script>
    </div>
</body>

</html>

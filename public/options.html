<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ducksy – Settings</title>
    <link rel="stylesheet" href="../dist/styles.css" />
</head>

<body class="bg-[#0a0a0a] text-[#ededed] font-sans antialiased flex justify-center p-8 md:p-12">
    <div class="w-full max-w-lg flex flex-col gap-8">

        <div>
            <div class="flex items-center gap-2.5 mb-1">
                <span class="text-2xl">🦆</span>
                <h1 class="text-2xl font-bold text-[#ededed]">Ducksy Settings</h1>
            </div>
            <p class="text-sm text-[#a3a3a3]">Configure your AI assistant</p>
        </div>

        <section class="space-y-3">
            <h2 class="text-xs font-semibold text-[#737373] uppercase tracking-wider">API Configuration</h2>
            <div class="space-y-1.5">
                <label for="api-key" class="text-sm font-medium text-[#d4d4d4]">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Enter your Gemini API key"
                    class="w-full px-3.5 py-2.5 border border-white/10 rounded-xl bg-[#141414] text-[#ededed] text-sm outline-none transition-colors focus:border-yellow-500" />
                <p class="text-xs text-[#737373]">Get a key from <a href="https://aistudio.google.com/apikey"
                        target="_blank" class="text-yellow-500 hover:underline">Google AI Studio</a></p>
            </div>
        </section>

        <section class="space-y-3">
            <h2 class="text-xs font-semibold text-[#737373] uppercase tracking-wider">Language</h2>
            <div class="space-y-1.5">
                <label for="language" class="text-sm font-medium text-[#d4d4d4]">Output Language</label>
                <select id="language"
                    class="w-full px-3.5 py-2.5 border border-white/10 rounded-xl bg-[#141414] text-[#ededed] text-sm outline-none transition-colors focus:border-yellow-500">
                    <option value="en">🇺🇸 English</option>
                    <option value="th">🇹🇭 ไทย (Thai)</option>
                    <option value="ja">🇯🇵 日本語 (Japanese)</option>
                    <option value="zh">🇨🇳 中文 (Chinese)</option>
                </select>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xs font-semibold text-[#737373] uppercase tracking-wider">Persona</h2>

            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label for="personality" class="text-sm font-medium text-[#d4d4d4]">Personality</label>
                    <span id="personality-value" class="text-xs text-[#a3a3a3] font-mono">50</span>
                </div>
                <input type="range" id="personality" min="0" max="100" value="50"
                    class="w-full h-1.5 rounded-full appearance-none bg-[#262626] accent-yellow-500" />
                <div class="flex justify-between text-[11px] text-[#737373]">
                    <span>Formal</span>
                    <span>Balanced</span>
                    <span>Creative</span>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label for="responses" class="text-sm font-medium text-[#d4d4d4]">Response Length</label>
                    <span id="responses-value" class="text-xs text-[#a3a3a3] font-mono">50</span>
                </div>
                <input type="range" id="responses" min="0" max="100" value="50"
                    class="w-full h-1.5 rounded-full appearance-none bg-[#262626] accent-yellow-500" />
                <div class="flex justify-between text-[11px] text-[#737373]">
                    <span>Concise</span>
                    <span>Standard</span>
                    <span>Verbose</span>
                </div>
            </div>
        </section>

        <div class="flex items-center gap-3">
            <button id="save-btn"
                class="px-8 py-2.5 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-black text-sm font-bold transition-colors">
                Save Settings
            </button>
            <span id="status" class="text-sm min-h-[20px]"></span>
        </div>
    </div>

    <script src="../dist/options/options.js"></script>
</body>

</html>
